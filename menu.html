<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú del Día</title>
    <style>
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf6e3;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }


        .menu-container {
            background-color: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #c0392b;
            font-size: 2.2em;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px dashed #e74c3c;
            padding-bottom: 15px;
        }


        h2 {
            color: #d35400;
            font-size: 1.4em;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            background-color: #fef9f8;
            margin-bottom: 8px;
            padding: 12px 15px;
            border-radius: 6px;
            border-left: 5px solid #e74c3c;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: default;
        }

        li:hover {
            transform: translateX(8px);
            background-color: #fceceb;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <h1>Menú del Día</h1>

    <h2>Entrantes</h2>
    <ul>
        <li>Papa rellena</li>
        <li>Sopa de casa</li>
        <li>Causa</li>
    </ul>

    <h2>Platos Principales</h2>
    <ul>
        <li>Estofado de carne</li>
        <li>Tallarin saltado</li>
        <li>Arroz con pollo</li>
    </ul>

    <h2>Postres</h2>
    <ul>
        <li>Mazamorra morada</li>
        <li>Gelatina</li>
        <li>Helado</li>
    </ul>

    <h2>Bebidas</h2>
    <ul>
        <li>Chicha de jora</li>
        <li>Coca-Cola</li>
        <li>Inca Kola</li>
    </ul>
</body>
</html>
